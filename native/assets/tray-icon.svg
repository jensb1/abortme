<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <!-- Template image: solid black on transparent, macOS uses alpha channel only -->
  <!-- Clock circle -->
  <circle cx="18" cy="19" r="13" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Hour hand (pointing up) -->
  <line x1="18" y1="19" x2="18" y2="11" stroke="black" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="18" y1="19" x2="24" y2="16" stroke="black" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Pause bars at top -->
  <rect x="14.5" y="2" width="2.5" height="6" rx="1" fill="black"/>
  <rect x="19" y="2" width="2.5" height="6" rx="1" fill="black"/>
</svg>
